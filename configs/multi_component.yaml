# ============================================================================
# КОНФИГУРАЦИЯ МНОГОКОМПОНЕНТНОЙ МОДЕЛИ KUBERNETES
# ============================================================================
# Эта конфигурация описывает отказоустойчивость трёх компонентов:
# 1. Control Plane (API Server, etcd, Controller Manager, Scheduler)
# 2. Worker Nodes (узлы для размещения Pod)
# 3. Pods (контейнеры приложений)
# ============================================================================

model:
  type: "multi_component"
  t_span_hours: 100          # Интервал моделирования (часы)
  n_points: 10000            # Количество точек дискретизации
  
  # --------------------------------------------------------------------------
  # Control Plane компоненты
  # --------------------------------------------------------------------------
  # Отвечают за управление кластером:
  # - API Server: интерфейс управления
  # - etcd: распределённое хранилище состояний
  # - Controller Manager: контроллеры
  # - Scheduler: планировщик Pod
  # --------------------------------------------------------------------------
  control_plane:
    lambda_c: 0.10           # Интенсивность отказов (1/час)
                             # Меньше, чем у других компонентов, 
                             # т.к. Control Plane более стабилен
    
    mu_c: 0.40               # Интенсивность восстановления (1/час)
                             # Выше приоритет восстановления
    
    alpha_cc: 0.05           # Внутреннее взаимодействие Control Plane
                             # Описывает каскадные эффекты между 
                             # компонентами CP
    
    alpha_cp: 0.10           # Влияние Pods на Control Plane
                             # Большое количество Pod увеличивает 
                             # нагрузку на API Server
  
  # --------------------------------------------------------------------------
  # Worker Nodes
  # --------------------------------------------------------------------------
  # Физические или виртуальные машины, на которых работают Pod
  # --------------------------------------------------------------------------
  worker_nodes:
    lambda_w: 0.20           # Интенсивность отказов (1/час)
                             # Средний уровень (аппаратные сбои, 
                             # проблемы с ОС)
    
    mu_w: 0.35               # Интенсивность восстановления (1/час)
                             # Восстановление узла требует времени
    
    alpha_ww: 0.08           # Внутреннее взаимодействие Worker Nodes
                             # Коррелированные отказы (сетевые проблемы,
                             # общие зависимости)
    
    alpha_wp: 0.12           # Влияние Pods на Worker Nodes
                             # Перегрузка узла большим количеством Pod
  
  # --------------------------------------------------------------------------
  # Pods (контейнеры приложений)
  # --------------------------------------------------------------------------
  # Минимальная единица развёртывания в Kubernetes
  # --------------------------------------------------------------------------
  pods:
    lambda_p: 0.30           # Интенсивность отказов (1/час)
                             # Самый высокий уровень (приложения 
                             # чаще падают, чем инфраструктура)
    
    mu_p: 0.25               # Интенсивность восстановления (1/час)
                             # Kubernetes автоматически перезапускает Pod
    
    alpha_pp: 0.15           # Внутреннее взаимодействие Pods
                             # Взаимозависимости между Pod 
                             # (микросервисы)
    
    beta_c: 0.05             # Влияние Control Plane на Pods
                             # Если CP недоступен, Pod не могут 
                             # быть созданы/управляемы
    
    beta_w: 0.10             # Влияние Worker Nodes на Pods
                             # Если узел падает, все Pod на нём 
                             # становятся недоступны

# ============================================================================
# ПАРАМЕТРЫ ОБНАРУЖЕНИЯ ОТКАЗОВ
# ============================================================================
probe:
  tau_pcm: 7.70              # Время обнаружения методом PCM (секунды)
                             # (N_probe - 0.5) * I_probe + L_probe
                             # = (3 - 0.5) * 3.0 + 0.2 = 7.70
  
  tau_scm: 0.10              # Время обнаружения методом SCM (секунды)
                             # L_signal = 0.1 (сигнальный метод)
  
  tau_default: 3.00          # Стандартная конфигурация Kubernetes (секунды)
                             # default: periodSeconds: 10, 
                             #          failureThreshold: 3

# ============================================================================
# ПОРОГОВЫЕ ЗНАЧЕНИЯ
# ============================================================================
thresholds:
  theta_threshold: 0.90      # Порог готовности (90%)
                             # Компонент считается работоспособным, 
                             # если x >= 0.90
  
  theta_critical: 0.50       # Критический порог (50%)
                             # Компонент считается отказавшим, 
                             # если x < 0.50

# ============================================================================
# НАЧАЛЬНЫЕ УСЛОВИЯ
# ============================================================================
initial_state:
  C0: 1.0                    # Control Plane: все компоненты работают
  W0: 1.0                    # Worker Nodes: все узлы работают
  P0: 1.0                    # Pods: все Pod работают

# ============================================================================
# НАСТРОЙКИ ВЫВОДА
# ============================================================================
output:
  csv_file: "vak_table_multi.csv"
  plot_file: "kubernetes_multi_component.png"
  log_file: "calculations_multi.log"
  dpi: 300                   # Разрешение графиков (точек на дюйм)